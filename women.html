<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Women’s Collection | ShopEasy 👗</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">ShopEasy</div>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#" class="active">Women</a></li>
        <li><a href="#">Cart</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Women's Collection Section -->
  <main>
    <section id="womens-collection">
      <h1>Women’s Collection 👗</h1>
      <div class="product-grid">

        <div class="product">
          <img src="dress1.png" alt="Floral Summer Dress">
          <h3>Floral Summer Dress</h3>
          <p>Price: ₹999</p>
          <button>Add to Cart</button>
        </div>

        <div class="product">
          <img src="dress2.png" alt="Casual Top">
          <h3>Casual Top</h3>
          <p>Price: ₹1599</p>
          <button>Add to Cart</button>
        </div>

        <div class="product">
          <img src="dress3.png" alt="Stylish Jeans">
          <h3>Stylish Jeans</h3>
          <p>Price: ₹1299</p>
          <button>Add to Cart</button>
        </div>

        <div class="product">
          <img src="dress4.png" alt="Ethnic Kurti">
          <h3>Ethnic Kurti</h3>
          <p>Price: ₹899</p>
          <button>Add to Cart</button>
        </div>

      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 ShopEasy. All rights reserved.</p>
  </footer>

</body>
</html>
